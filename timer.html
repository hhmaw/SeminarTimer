<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fullscreen Timer</title>
<style>
html,body{
    margin:0;
    height:100%;
    font-family:system-ui,Arial,sans-serif;
    background:#111;
    color:white;
}

#container{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100%;
    text-align:center;
}

#time{
    font-size:20vw;
    font-weight:700;
    letter-spacing:0.05em;
    cursor:default;
}

#phase{
    margin-top:8px;
    font-size:2.2vw;
    opacity:0.9;
    min-height:1.4em;
}

#subinfo{
    margin-top:10px;
    font-size:1.2vw;
    opacity:0.7;
    min-height:1.4em;
}

#legend{
    position:fixed;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    font-size:16px;
    opacity:0.7;
    cursor:pointer;
    user-select:none;
    text-align:center;
    white-space:normal;
    width:min(1200px, calc(100vw - 30px));
}

#overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    backdrop-filter: blur(6px);
    z-index:14;
    pointer-events: auto;
}

    #mobileControls {
        display: flex;
        position: fixed;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%) translateY(0);
        transition: transform 200ms ease, opacity 200ms ease;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        padding: 10px 12px;
        background: rgba(0,0,0,0.60);
        border-radius: 14px;
        max-width: calc(100vw - 18px);
        z-index: 20;
        box-sizing: border-box;
        opacity: 1;
    }

    #mobileControls.slide-out {
        transform: translateX(-50%) translateY(130%);
        opacity: 0;
    }

    .controlBtn {
        padding: 10px 12px;
        font-size: 14px;
        border-radius: 10px;
        border: 1px solid #555;
        background: rgba(255,255,255,0.08);
        color: #fff;
        cursor: pointer;
        min-width: 70px;
        white-space: nowrap;
    }

    .controlBtn:hover {
        background: rgba(255,255,255,0.14);
    }

    .teacher-only {
        display: none;
    }

    #configPanel {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(255,255,255,0.96);
        color: #000;
        border: 0;
        border-radius: 14px;
        padding: 16px 14px 14px;
        display: none;
        width: min(560px, 90vw);
        max-height: 90vh;
        overflow: auto;
        box-shadow: 0 12px 30px rgba(0,0,0,0.45);
        z-index: 9999;
        box-sizing: border-box;
    }

    #configPanel.open{
        display:block;
        opacity: 1;
    }

    @keyframes slideIn {
        to {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    }

.configHeader{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:14px;
}

.iconBtn{
    padding:6px 10px;
    border:none;
    border-radius:10px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
}

.iconBtn:hover{
    background: rgba(255,255,255,0.18);
}

.settingsGrid{
    display:grid;
    grid-template-columns:repeat(3, minmax(0, 1fr));
    gap:10px;
    margin-bottom:16px;
}

.teacherGrid{
    display:grid;
    grid-template-columns:repeat(3, minmax(0, 1fr));
    gap:10px;
    margin-bottom:16px;
}

.field{
    display:flex;
    flex-direction:column;
    gap:6px;
}

    .stepper{
        display:flex;
        align-items:center;
        gap:4px;
        width: 100%;
    }

    .stepper input[type="number"]{
        flex: 0 0 72px;
        min-width: 50px;
        text-align: center;
    }

    .stepperBtn{
        width: 28px;
        height: 28px;
        border: 1px solid rgba(0,0,0,0.2);
        border-radius: 10px;
        background: rgba(255,255,255,0.85);
        color: #000;
        font-size: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .stepperBtn:hover{
        background: rgba(255,255,255,1);
    }

input[type="number"]{
    padding:8px 10px;
    font-size:15px;
    border:1px solid #ccc;
    border-radius:8px;
    background:#fff;
    color:#000;
    text-align:center;
}

.checkboxRow{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:14px;
    font-size:14px;
}

.buttonRow{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

button{
    padding:8px 12px;
    font-size:15px;
    border:1px solid #444;
    border-radius:8px;
    background:#222;
    color:#fff;
    cursor:pointer;
}

button:hover{
    background:#2d2d2d;
}

#configPanel button{
    border:1px solid rgba(0,0,0,0.2);
    background:#fff;
    color:#000;
}

#configPanel button:hover{
    background:#f2f2f2;
}

.warning{
    background:#ffd400;
    color:#000;
}

.flash{
    animation:flashRed 2s infinite;
}

.breakPhase{
    background:#0a2f54;
    color:#fff;
}

.switchPhase{
    background:#2e244a;
    color:#fff;
}

@keyframes flashRed{
    0%{background:#300;}
    50%{background:#ff0000;}
    100%{background:#300;}
}

@media (max-width: 900px){
    .settingsGrid,
    .teacherGrid{
        grid-template-columns:repeat(3, minmax(120px, 1fr));
    }

    #phase{ font-size:5vw; }
    #subinfo{ font-size:3.2vw; }
}

@media (max-width: 600px) {
    #container {
        padding: 10px 8px 60px;
    }

    #time {
        font-size: 18vw;
    }

    #phase { font-size: 6vw; }
    #subinfo { font-size: 4vw; }

    #legend {
        font-size: 14px;
        left: 50%;
        width: calc(100vw - 30px);
        padding: 10px 12px;
    }

    #mobileControls {
        display: flex;
    }

    #configPanel {
        position: fixed;
        inset: 0;
        background: rgba(255,255,255,0.96);
        color: #000;
        border: 0;
        border-radius: 0;
        padding: 16px 14px 14px;
        display: none;
        width: 100%;
        height: 100%;
        max-width: 100%;
        max-height: 100%;
        overflow: auto;
        box-shadow: none;
        z-index: 9999;
        box-sizing: border-box;
    }

    #configPanel.open {
        display: block !important;
        opacity: 1 !important;
        transform: none !important;
    }

    .settingsGrid,
    .teacherGrid {
        grid-template-columns: repeat(3, minmax(120px, 1fr));
    }

    .buttonRow {
        flex-direction: column;
        align-items: stretch;
    }

    #closeConfigBtn {
        display: none;
    }

    button {
        width: 100%;
        padding: 12px 14px;
        font-size: 16px;
    }

    input[type="number"] {
        font-size: 16px;
        padding: 12px 14px;
    }

    .field label {
        font-size: 14px;
    }
}
</style>
</head>

<body>
<div id="container">
    <div id="time">20:00</div>
    <div id="phase"></div>
    <div id="subinfo"></div>
</div>

<div id="overlay"></div>

<div id="configPanel">
    <div class="configHeader">
        <div class="sectionTitle">Timer Settings</div>
        <button id="closeConfigBtnTop" class="iconBtn" type="button" aria-label="Close settings">✕</button>
    </div>

    <div class="settingsGrid">
        <div class="field">
            <label for="defaultMinutes">Default timer (min)</label>
            <input id="defaultMinutes" type="number" min="1" step="1">
        </div>

        <div class="field">
            <label for="playGong">Play gong when timer ends</label>
            <input id="playGong" type="checkbox">
        </div>

        <div class="field">
            <label for="keepAwake">Keep screen awake</label>
            <input id="keepAwake" type="checkbox">
        </div>
    </div>

    <div class="checkboxRow">
        <input id="teacherModeEnabled" type="checkbox">
        <label for="teacherModeEnabled">Enable teacher mode</label>
    </div>

    <div id="teacherSettingsWrap">
        <div class="sectionTitle">Teacher Mode Schedule</div>
        <div class="teacherGrid">
            <div class="field">
                <label for="teacherPresentations">Presentations total</label>
                <input id="teacherPresentations" type="number" min="1" step="1">
            </div>

            <div class="field">
                <label for="teacherPresentationMin">Presentation time (min)</label>
                <input id="teacherPresentationMin" type="number" min="1" step="1">
            </div>

            <div class="field">
                <label for="teacherQuestionsMin">Questions after each (min)</label>
                <input id="teacherQuestionsMin" type="number" min="0" step="1">
            </div>

            <div class="field">
                <label for="teacherSwitchMin">Switch time (min)</label>
                <input id="teacherSwitchMin" type="number" min="0" step="1">
            </div>

            <div class="field">
                <label for="teacherBreakEveryMin">Break after elapsed time (min)</label>
                <input id="teacherBreakEveryMin" type="number" min="0" step="1">
            </div>

            <div class="field">
                <label for="teacherBreakMin">Break length (min)</label>
                <input id="teacherBreakMin" type="number" min="0" step="1">
            </div>
        </div>
    </div>

    <div id="presetWrap">
        <div class="sectionTitle">Presets / Import‑Export</div>

        <div class="buttonRow">
            <button id="deletePresetBtn">Delete selected</button>
        </div>

        <div class="field">
            <label for="presetSelect">Saved presets</label>
            <select id="presetSelect"></select>
        </div>

    </div>

    <div class="buttonRow">
        <button id="saveDefaultBtn">Save</button>
        <button id="closeConfigBtn">Close</button>
    </div>
</div>

<div id="legend">
    Normal: Tap controls to Start/Pause, Reset, or adjust time. Tap here for settings.<br>
    Teacher mode: Use on-screen buttons for Next/Previous blocks and Pause/Resume.
</div>

<div id="mobileControls" aria-label="Timer controls">
    <button id="startPauseBtn" class="controlBtn" type="button">Start</button>
    <button id="resetBtn" class="controlBtn" type="button">Reset</button>
    <button id="minus1mBtn" class="controlBtn" type="button">−1m</button>
    <button id="plus1mBtn" class="controlBtn" type="button">+1m</button>
    <button id="minus10sBtn" class="controlBtn" type="button">−10s</button>
    <button id="plus10sBtn" class="controlBtn" type="button">+10s</button>
    <button id="fullscreenBtn" class="controlBtn" type="button">Fullscreen</button>
    <button id="settingsBtn" class="controlBtn" type="button">Settings</button>
    <button id="teacherPrevBtn" class="controlBtn teacher-only" type="button">◀ Prev</button>
    <button id="teacherNextBtn" class="controlBtn teacher-only" type="button">Next ▶</button>
</div>

<script>
const STORAGE_KEY = "fullscreenTimerSettingsV4";

const DEFAULTS = {
    defaultTime: 20 * 60,
    teacherMode: false,
    teacherPresentations: 8,
    teacherPresentationMin: 10,
    teacherQuestionsMin: 5,
    teacherSwitchMin: 2,
    teacherBreakEveryMin: 60,
    teacherBreakMin: 10,
    playGong: false,
    keepAwake: true,
    presets: {}
};

let settings = loadSettings();
let time = settings.defaultTime;
let running = false;
let interval = null;
let teacherState = createTeacherState();
let gongPlayed = false;
let wakeLock = null;

async function requestWakeLock(){
    if(!settings.keepAwake) return;
    if(!('wakeLock' in navigator)) return;
    if(document.visibilityState !== 'visible') return;
    if(wakeLock) return;

    try{
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => {
            wakeLock = null;
        });
    }catch(err){
        console.warn('Wake lock request failed:', err);
    }
}

async function releaseWakeLock(){
    if(!wakeLock) return;
    try{
        await wakeLock.release();
    }catch{}
    wakeLock = null;
}

async function updateWakeLock(){
    if(!settings.keepAwake || document.visibilityState !== 'visible'){
        await releaseWakeLock();
        return;
    }
    await requestWakeLock();
}

document.addEventListener('visibilitychange', () => {
    updateWakeLock();
});

const timeEl = document.getElementById("time");
const phaseEl = document.getElementById("phase");
const subinfoEl = document.getElementById("subinfo");
const legendEl = document.getElementById("legend");
const configPanelEl = document.getElementById("configPanel");
const overlayEl = document.getElementById("overlay");
const mobileControlsEl = document.getElementById("mobileControls");

function isMobileAgent(){
    return /Mobi|Android|iPhone|iPad|iPod|Opera Mini|IEMobile/.test(navigator.userAgent) || window.matchMedia("(max-width: 768px)").matches;
}

function showError(message){
    if(subinfoEl){
        subinfoEl.textContent = `Error: ${message}`;
        subinfoEl.style.color = "#ff6666";
    }
}

window.addEventListener("error", e => {
    showError(e.message || String(e));
});
window.addEventListener("unhandledrejection", e => {
    const msg = e.reason ? (e.reason.message || String(e.reason)) : "Unknown promise rejection";
    showError(msg);
});

const defaultMinutesInput = document.getElementById("defaultMinutes");
const teacherModeEnabledInput = document.getElementById("teacherModeEnabled");
const teacherPresentationsInput = document.getElementById("teacherPresentations");
const teacherPresentationMinInput = document.getElementById("teacherPresentationMin");
const teacherQuestionsMinInput = document.getElementById("teacherQuestionsMin");
const teacherSwitchMinInput = document.getElementById("teacherSwitchMin");
const teacherBreakEveryMinInput = document.getElementById("teacherBreakEveryMin");
const teacherBreakMinInput = document.getElementById("teacherBreakMin");
const playGongInput = document.getElementById("playGong");
const keepAwakeInput = document.getElementById("keepAwake");
const teacherSettingsWrap = document.getElementById("teacherSettingsWrap");

const presetSelect = document.getElementById("presetSelect");
const deletePresetBtn = document.getElementById("deletePresetBtn");

const saveDefaultBtn = document.getElementById("saveDefaultBtn");
const closeConfigBtn = document.getElementById("closeConfigBtn");
const closeConfigBtnTop = document.getElementById("closeConfigBtnTop");

const startPauseBtn = document.getElementById("startPauseBtn");
const resetBtn = document.getElementById("resetBtn");
const minus1mBtn = document.getElementById("minus1mBtn");
const plus1mBtn = document.getElementById("plus1mBtn");
const minus10sBtn = document.getElementById("minus10sBtn");
const plus10sBtn = document.getElementById("plus10sBtn");
const fullscreenBtn = document.getElementById("fullscreenBtn");
const settingsBtn = document.getElementById("settingsBtn");
const teacherPrevBtn = document.getElementById("teacherPrevBtn");
const teacherNextBtn = document.getElementById("teacherNextBtn");

presetSelect.addEventListener("change", () => {
    const name = presetSelect.value;
    if(name){
        applyPreset(name);
    }
});

deletePresetBtn.addEventListener("click", () => {
    const name = presetSelect.value;
    if(name){
        deletePreset(name);
    }
});

startPauseBtn?.addEventListener("click", () => startPause());
resetBtn?.addEventListener("click", () => reset());
minus1mBtn?.addEventListener("click", () => adjustTime(-60));
plus1mBtn?.addEventListener("click", () => adjustTime(60));
minus10sBtn?.addEventListener("click", () => adjustTime(-10));
plus10sBtn?.addEventListener("click", () => adjustTime(10));
fullscreenBtn?.addEventListener("click", () => {
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
    }else{
        document.exitFullscreen();
    }
});
settingsBtn?.addEventListener("click", () => {
    if(subinfoEl){
        subinfoEl.textContent = "Settings button clicked";
    }
    openSettingsModal();
});
teacherPrevBtn?.addEventListener("click", () => previousTeacherStep());
teacherNextBtn?.addEventListener("click", () => advanceTeacherStep(/*auto=*/ false));

function migrateTeacherPresetKeys(presets){
    // Older presets included a “T<minutes>m_” prefix that is unused in teacher mode.
    // Rename them to a cleaner format like “TG_…” or “Tg_…”.
    for(const key of Object.keys(presets)){
        const match = key.match(/^T\d+m_([gG]_.*)$/);
        if(!match) continue;

        const base = `T${match[1]}`;
        let newKey = base;
        let counter = 1;
        while(newKey in presets && newKey !== key){
            newKey = `${base}-${counter++}`;
        }

        if(newKey !== key){
            presets[newKey] = presets[key];
            delete presets[key];
        }
    }
}

function loadSettings(){
    try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return {...DEFAULTS};
        const parsed = JSON.parse(raw);
        const presets = parsed.presets && typeof parsed.presets === "object" ? parsed.presets : {};
        migrateTeacherPresetKeys(presets);

        return {
            defaultTime: positiveInt(parsed.defaultTime, DEFAULTS.defaultTime),
            teacherMode: Boolean(parsed.teacherMode),
            teacherPresentations: positiveInt(parsed.teacherPresentations, DEFAULTS.teacherPresentations),
            teacherPresentationMin: positiveInt(parsed.teacherPresentationMin, DEFAULTS.teacherPresentationMin),
            teacherQuestionsMin: nonNegativeInt(parsed.teacherQuestionsMin, DEFAULTS.teacherQuestionsMin),
            teacherSwitchMin: nonNegativeInt(parsed.teacherSwitchMin, DEFAULTS.teacherSwitchMin),
            teacherBreakEveryMin: nonNegativeInt(parsed.teacherBreakEveryMin, DEFAULTS.teacherBreakEveryMin),
            teacherBreakMin: nonNegativeInt(parsed.teacherBreakMin, DEFAULTS.teacherBreakMin),
            playGong: Boolean(parsed.playGong),
            keepAwake: (parsed.keepAwake === undefined) ? DEFAULTS.keepAwake : Boolean(parsed.keepAwake),
            presets
        };
    }catch{
        return {...DEFAULTS};
    }
}

function saveSettings(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
}

function setupNumberSteppers(){
    const numberInputs = configPanelEl.querySelectorAll('input[type="number"]');
    numberInputs.forEach(input => {
        if(input.closest('.stepper')) return; // already wrapped

        const wrapper = document.createElement('div');
        wrapper.className = 'stepper';

        const step = parseFloat(input.step) || 1;

        const dec = document.createElement('button');
        dec.type = 'button';
        dec.className = 'stepperBtn';
        dec.textContent = '−';
        dec.setAttribute('aria-label', 'Decrease');
        dec.addEventListener('click', () => {
            input.value = Number(input.value || 0) - step;
            input.dispatchEvent(new Event('input', { bubbles: true }));
        });

        const inc = document.createElement('button');
        inc.type = 'button';
        inc.className = 'stepperBtn';
        inc.textContent = '+';
        inc.setAttribute('aria-label', 'Increase');
        inc.addEventListener('click', () => {
            input.value = Number(input.value || 0) + step;
            input.dispatchEvent(new Event('input', { bubbles: true }));
        });

        input.parentNode.insertBefore(wrapper, input);
        wrapper.appendChild(dec);
        wrapper.appendChild(input);
        wrapper.appendChild(inc);
    });
}


function updatePresetOptions(){
    const keys = Object.keys(settings.presets || {}).sort();
    const selected = presetSelect.value;

    presetSelect.innerHTML = "";
    keys.forEach(key => {
        const opt = document.createElement("option");
        opt.value = key;
        opt.textContent = key;
        presetSelect.appendChild(opt);
    });

    if(selected && settings.presets && settings.presets[selected]){
        presetSelect.value = selected;
    }
}

function applyPreset(name){
    if(!settings.presets || !settings.presets[name]) return;
    settings = {
        ...settings,
        ...settings.presets[name]
    };
    saveSettings();
    syncInputsFromSettings();
    reset();
}

function encodeSettings(obj){
    const json = JSON.stringify(obj);
    const b64 = btoa(encodeURIComponent(json).replace(/%([0-9A-F]{2})/g, (_,p) => String.fromCharCode('0x'+p)));
    return b64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

function genPresetName(){
    const defaultMin = Math.round(settings.defaultTime / 60);
    const gong = settings.playGong ? "G" : "g";

    if(!settings.teacherMode){
        // Normal mode presets only depend on timer length + gong.
        return `N${defaultMin}m_${gong}`;
    }

    // Teacher mode presets include full schedule settings.
    // The base time (default timer) is not used in teacher mode, so it is omitted from the name.
    return `T${gong}_P${settings.teacherPresentations}x${settings.teacherPresentationMin}m_Q${settings.teacherQuestionsMin}m_S${settings.teacherSwitchMin}m_BE${settings.teacherBreakEveryMin}m_B${settings.teacherBreakMin}m`;
}

function savePreset(){
    const config = {
        defaultTime: settings.defaultTime,
        teacherMode: settings.teacherMode,
        playGong: settings.playGong,
        keepAwake: settings.keepAwake,
        ...(settings.teacherMode ? {
            teacherPresentations: settings.teacherPresentations,
            teacherPresentationMin: settings.teacherPresentationMin,
            teacherQuestionsMin: settings.teacherQuestionsMin,
            teacherSwitchMin: settings.teacherSwitchMin,
            teacherBreakEveryMin: settings.teacherBreakEveryMin,
            teacherBreakMin: settings.teacherBreakMin
        } : {})
    };

    settings.presets = settings.presets || {};
    const configJson = JSON.stringify(config);

    // If an identical preset already exists, use it instead of creating a new one.
    for(const [key, value] of Object.entries(settings.presets)){
        if(JSON.stringify(value) === configJson){
            presetSelect.value = key;
            return;
        }
    }

    let key = genPresetName();
    let counter = 1;
    while(settings.presets[key]){
        key = `${genPresetName()}-${counter++}`;
    }

    settings.presets[key] = config;
    saveSettings();
    updatePresetOptions();
    presetSelect.value = key;
}

function deletePreset(name){
    if(!settings.presets || !settings.presets[name]) return;

    const keys = Object.keys(settings.presets || {}).sort();
    const index = keys.indexOf(name);

    delete settings.presets[name];
    saveSettings();
    updatePresetOptions();

    const remainingKeys = Object.keys(settings.presets || {}).sort();
    if(remainingKeys.length === 0){
        // No presets left: leave user in default state
        return;
    }

    // Prefer the next preset, or fall back to the previous one.
    const newIndex = Math.min(index, remainingKeys.length - 1);
    const newSelection = remainingKeys[newIndex];

    presetSelect.value = newSelection;
    applyPreset(newSelection);
}

function positiveInt(value, fallback){
    const n = parseInt(value, 10);
    return Number.isFinite(n) && n > 0 ? n : fallback;
}

function nonNegativeInt(value, fallback){
    const n = parseInt(value, 10);
    return Number.isFinite(n) && n >= 0 ? n : fallback;
}

function syncInputsFromSettings(){
    defaultMinutesInput.value = Math.round(settings.defaultTime / 60);

    teacherModeEnabledInput.checked = settings.teacherMode;
    teacherPresentationsInput.value = settings.teacherPresentations;
    teacherPresentationMinInput.value = settings.teacherPresentationMin;
    teacherQuestionsMinInput.value = settings.teacherQuestionsMin;
    teacherSwitchMinInput.value = settings.teacherSwitchMin;
    teacherBreakEveryMinInput.value = settings.teacherBreakEveryMin;
    teacherBreakMinInput.value = settings.teacherBreakMin;
    playGongInput.checked = settings.playGong;
    keepAwakeInput.checked = settings.keepAwake;
    teacherSettingsWrap.style.display = settings.teacherMode ? "block" : "none";

    updatePresetOptions();

    // If teacher mode is enabled, show the full config panel immediately.
    if(settings.teacherMode && !configPanelEl.classList.contains("open")){
        configPanelEl.classList.add("open");
    }
}

function format(t){
    let sign = t < 0 ? "-" : "";
    t = Math.abs(t);
    let m = Math.floor(t / 60);
    let s = t % 60;
    return sign + String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
}

function createTeacherState(){
    if(!settings.teacherMode){
        return null;
    }

    const sequence = [];
    const totalPresentations = settings.teacherPresentations;
    const breakEverySeconds = settings.teacherBreakEveryMin * 60;
    const breakSeconds = settings.teacherBreakMin * 60;
    let elapsedInstructional = 0;
    let nextBreakAt = breakEverySeconds;

    const tryInsertBreakAtBoundary = (currentPresentation) => {
        if(breakEverySeconds <= 0 || breakSeconds <= 0) return false;
        if(currentPresentation >= totalPresentations) return false;

        if(elapsedInstructional >= nextBreakAt){
            // Insert one break at the first boundary where the accumulated planned time has passed the break threshold.
            sequence.push({ type: "break", label: "Break", duration: breakSeconds });

            // Advance the next break marker past any skipped thresholds.
            while(elapsedInstructional >= nextBreakAt){
                nextBreakAt += breakEverySeconds;
            }

            return true;
        }

        return false;
    };

    for(let i = 1; i <= totalPresentations; i++){
        const presentationSeconds = settings.teacherPresentationMin * 60;
        const questionSeconds = settings.teacherQuestionsMin * 60;
        const switchSeconds = settings.teacherSwitchMin * 60;

        sequence.push({
            type: "presentation",
            label: `Presentation ${i}/${totalPresentations}`,
            duration: presentationSeconds
        });
        elapsedInstructional += presentationSeconds;

        if(questionSeconds > 0){
            sequence.push({
                type: "questions",
                label: `Questions after presentation ${i}`,
                duration: questionSeconds
            });
            elapsedInstructional += questionSeconds;
        }

        // Decide what comes next between this presentation block and the next one.
        const breakInserted = tryInsertBreakAtBoundary(i);
        if(!breakInserted && i < totalPresentations && switchSeconds > 0){
            sequence.push({
                type: "switch",
                label: "Switch time",
                duration: switchSeconds
            });
            elapsedInstructional += switchSeconds;
        }
    }

    if(sequence.length === 0){
        return null;
    }

    return {
        stepIndex: 0,
        sequence
    };
}

function getCurrentStep(){
    if(!teacherState || !teacherState.sequence.length) return null;
    return teacherState.sequence[teacherState.stepIndex] || null;
}

function setTimeForCurrentMode(){
    if(settings.teacherMode){
        teacherState = createTeacherState();
        const step = getCurrentStep();
        time = step ? step.duration : settings.defaultTime;
    }else{
        teacherState = null;
        time = settings.defaultTime;
    }
}

function update(){
    timeEl.textContent = format(time);

    document.body.classList.remove("warning", "flash", "breakPhase", "switchPhase");

    // Always hide the legend text — the on-screen controls are used instead.
    if(legendEl){
        legendEl.style.display = "none";
    }

    if(settings.teacherMode){
        const step = getCurrentStep();

        if(step){
            phaseEl.textContent = step.label;

            if(step.type === "presentation"){
                subinfoEl.textContent = running ? "Talk in progress" : "Talk paused";
            }else if(step.type === "questions"){
                subinfoEl.textContent = running ? "Question time" : "Questions paused";
            }else if(step.type === "switch"){
                subinfoEl.textContent = running ? "Prepare next presenter" : "Switch paused";
                document.body.classList.add("switchPhase");
            }else if(step.type === "break"){
                subinfoEl.textContent = running ? "Pause" : "Break paused";
                document.body.classList.add("breakPhase");
            }else{
                subinfoEl.textContent = "";
            }
        }else{
            phaseEl.textContent = "Schedule complete";
            subinfoEl.textContent = "Press R to restart";
        }
    }else{
        phaseEl.textContent = "";
        subinfoEl.textContent = "";
    }

    if(startPauseBtn){
        startPauseBtn.textContent = running ? "Pause" : "Start";
    }

    const teacherModeActive = Boolean(settings.teacherMode);
    document.querySelectorAll(".teacher-only").forEach(btn => {
        btn.style.display = teacherModeActive ? "inline-flex" : "none";
    });

    if(time <= 120 && time > 0){
        document.body.classList.add("warning");
    }

    if(time <= 0){
        document.body.classList.add("flash");
    }
}

function playGong(){
    try{
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = "sine";
        osc.frequency.setValueAtTime(440, ctx.currentTime);

        gain.gain.setValueAtTime(0, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.start();
        osc.stop(ctx.currentTime + 1.2);
    }catch{
        // Ignore audio errors (e.g., blocked by browser autoplay policy)
    }
}

function tick(){
    time--;
    update();

    if(time <= 0){
        if(!settings.teacherMode){
            if(settings.playGong && !gongPlayed){
                playGong();
                gongPlayed = true;
            }
        }

        if(settings.teacherMode){
            advanceTeacherStep(/*auto=*/ true);
        }
    }
}

function advanceTeacherStep(auto = true){
    if(!teacherState) return;

    if(auto && settings.playGong){
        playGong();
    }

    teacherState.stepIndex++;

    const step = getCurrentStep();
    if(step){
        time = step.duration;
        ensureTimerRunning();
        update();
    }else{
        running = false;
        clearInterval(interval);
        time = 0;
        update();
    }
}

function startPause(){
    running = !running;

    if(running){
        // Ensure the gong can play again in normal mode.
        gongPlayed = false;
        clearInterval(interval);
        interval = setInterval(tick, 1000);
    }else{
        clearInterval(interval);
    }
    update();
}

function ensureTimerRunning(){
    if(running) return;

    running = true;
    if(!settings.teacherMode){
        // Allow gong to play again when reaching 00:00 in normal mode.
        gongPlayed = false;
    }
    clearInterval(interval);
    interval = setInterval(tick, 1000);
}

function reset(){
    running = false;
    clearInterval(interval);
    gongPlayed = false;
    setTimeForCurrentMode();
    update();
}

function previousTeacherStep(){
    if(!teacherState) return;
    if(teacherState.stepIndex <= 0){
        teacherState.stepIndex = 0;
    }else{
        teacherState.stepIndex--;
    }
    const step = getCurrentStep();
    if(step){
        time = step.duration;
    }else{
        time = settings.defaultTime;
    }
    ensureTimerRunning();
    update();
}

function adjustTime(seconds){
    time += seconds;
    update();
}

function openConfig(){
    syncInputsFromSettings();

    if(overlayEl){
        overlayEl.style.display = "block";
    }
    if(mobileControlsEl){
        mobileControlsEl.classList.add("slide-out");
    }
    document.body.style.overflow = "hidden";

    if(configPanelEl){
        configPanelEl.style.display = "block";
        configPanelEl.classList.add("open");
    }

    defaultMinutesInput.focus();
    defaultMinutesInput.select();
}

function closeConfig(){
    const debugPanel = document.getElementById("debugSettingsPanel");
    if(debugPanel){
        debugPanel.remove();
    }

    if(configPanelEl){
        configPanelEl.classList.remove("open");
        configPanelEl.style.display = "none";
    }
    if(overlayEl){
        overlayEl.style.display = "none";
    }
    if(mobileControlsEl){
        mobileControlsEl.classList.remove("slide-out");
    }
    document.body.style.overflow = "";
    if(document.activeElement){
        document.activeElement.blur();
    }
}

function toggleConfig(){
    if(configPanelEl.classList.contains("open")){
        closeConfig();
    }else{
        openConfig();
    }
}

function openSettingsModal(){
    openConfig();
}

function applySettingsFromInputs(){
    settings = {
        defaultTime: positiveInt(defaultMinutesInput.value, Math.round(DEFAULTS.defaultTime / 60)) * 60,
        teacherMode: teacherModeEnabledInput.checked,
        teacherPresentations: positiveInt(teacherPresentationsInput.value, DEFAULTS.teacherPresentations),
        teacherPresentationMin: positiveInt(teacherPresentationMinInput.value, DEFAULTS.teacherPresentationMin),
        teacherQuestionsMin: nonNegativeInt(teacherQuestionsMinInput.value, DEFAULTS.teacherQuestionsMin),
        teacherSwitchMin: nonNegativeInt(teacherSwitchMinInput.value, DEFAULTS.teacherSwitchMin),
        teacherBreakEveryMin: nonNegativeInt(teacherBreakEveryMinInput.value, DEFAULTS.teacherBreakEveryMin),
        teacherBreakMin: nonNegativeInt(teacherBreakMinInput.value, DEFAULTS.teacherBreakMin),
        playGong: playGongInput.checked,
        keepAwake: keepAwakeInput.checked,
        presets: settings.presets || {}
    };

    saveSettings();
    savePreset();
    syncInputsFromSettings();
    updateWakeLock();
    reset();
    closeConfig();
}

teacherModeEnabledInput.addEventListener("change", () => {
    teacherSettingsWrap.style.display = teacherModeEnabledInput.checked ? "block" : "none";
    if(teacherModeEnabledInput.checked){
        configPanelEl.classList.add("open");
    }
});

legendEl.addEventListener("click", toggleConfig);
saveDefaultBtn.addEventListener("click", applySettingsFromInputs);
closeConfigBtn.addEventListener("click", closeConfig);
closeConfigBtnTop?.addEventListener("click", closeConfig);
if(overlayEl){
    overlayEl.addEventListener("click", closeConfig);
}

// Make it easy to start/pause by tapping the timer area.
const containerEl = document.getElementById("container");
if(containerEl){
    containerEl.addEventListener("click", e => {
        if(e.target.closest("button") || e.target.closest("input") || e.target.closest("select")) return;
        if(configPanelEl.classList.contains("open")) return;
        startPause();
    });
}

configPanelEl.addEventListener("keydown", e => {
    if(e.key === "Enter" && e.target.tagName === "INPUT"){
        applySettingsFromInputs();
    }
    if(e.key === "Escape"){
        closeConfig();
    }
});

document.addEventListener("keydown", e => {
    const target = e.target;
    const tag = target && target.tagName ? target.tagName : "";
    const insideConfig = configPanelEl.contains(target);

    if(insideConfig && (tag === "INPUT" || tag === "BUTTON" || tag === "LABEL")){
        if(e.key === "Escape"){
            e.preventDefault();
            closeConfig();
        }
        return;
    }

    if(settings.teacherMode){
        if(e.code === "Space"){
            e.preventDefault();
            advanceTeacherStep(/*auto=*/ false);
            return;
        }

        if(e.key === "Backspace"){
            e.preventDefault();
            previousTeacherStep();
            return;
        }

        if(e.key === "p" || e.key === "P"){
            e.preventDefault();
            startPause();
            return;
        }

        if(e.key === "r" || e.key === "R"){
            e.preventDefault();
            reset();
            return;
        }

        if(e.key === "ArrowUp"){
            e.preventDefault();
            adjustTime(60);
            return;
        }

        if(e.key === "ArrowDown"){
            e.preventDefault();
            adjustTime(-60);
            return;
        }

        if(e.key === "ArrowRight"){
            e.preventDefault();
            adjustTime(10);
            return;
        }

        if(e.key === "ArrowLeft"){
            e.preventDefault();
            adjustTime(-10);
            return;
        }

        if(e.key === "f" || e.key === "F"){
            e.preventDefault();
            if(!document.fullscreenElement){
                document.documentElement.requestFullscreen();
            }else{
                document.exitFullscreen();
            }
            return;
        }

        if(e.key === "Escape" && configPanelEl.classList.contains("open")){
            e.preventDefault();
            closeConfig();
        }

        return;
    }

    if(e.code === "Space"){
        e.preventDefault();
        startPause();
        return;
    }

    if(e.key === "r" || e.key === "R"){
        e.preventDefault();
        reset();
        return;
    }

    if(e.key === "ArrowUp"){
        e.preventDefault();
        adjustTime(60);
        return;
    }

    if(e.key === "ArrowDown"){
        e.preventDefault();
        adjustTime(-60);
        return;
    }

    if(e.key === "ArrowRight"){
        e.preventDefault();
        adjustTime(10);
        return;
    }

    if(e.key === "ArrowLeft"){
        e.preventDefault();
        adjustTime(-10);
        return;
    }

    if(e.key === "f" || e.key === "F"){
        e.preventDefault();
        if(!document.fullscreenElement){
            document.documentElement.requestFullscreen();
        }else{
            document.exitFullscreen();
        }
        return;
    }

    if(e.key === "Escape" && configPanelEl.classList.contains("open")){
        e.preventDefault();
        closeConfig();
    }
});

document.addEventListener("click", e => {
    if(
        configPanelEl.classList.contains("open") &&
        !configPanelEl.contains(e.target) &&
        e.target !== legendEl &&
        !(mobileControlsEl && mobileControlsEl.contains(e.target))
    ){
        closeConfig();
    }
});

syncInputsFromSettings();
updateWakeLock();
setupNumberSteppers();
setTimeForCurrentMode();
update();

// Auto-hide the mobile controls after a short idle period.
let idleHideTimer = null;
const idleHideDelay = 2500;
function showMobileControls(){
    if(!mobileControlsEl) return;
    mobileControlsEl.classList.remove("slide-out");
}
function hideMobileControls(){
    if(!mobileControlsEl) return;
    mobileControlsEl.classList.add("slide-out");
}
function resetIdleHide(){
    showMobileControls();
    clearTimeout(idleHideTimer);

    // On desktop, keep the control bar visible at all times.
    if(isMobileAgent()){
        idleHideTimer = setTimeout(hideMobileControls, idleHideDelay);
    }
}

["pointerdown","touchstart","keydown"].forEach(evt => {
    document.addEventListener(evt, resetIdleHide, { passive: true });
});

// Start hiding after a few seconds.
resetIdleHide();
</script>
